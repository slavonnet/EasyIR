# Example helpers for EasyIR widget control.
# Create equivalent helpers via Settings -> Devices & Services -> Helpers,
# or copy this structure into your configuration if you manage YAML manually.

input_select:
  easyir_hvac_mode:
    name: EasyIR HVAC Mode
    options:
      - off
      - cool
      - dry
    initial: off

  easyir_fan_mode:
    name: EasyIR Fan Mode
    options:
      - auto
      - low
      - mid
      - high
    initial: auto

input_number:
  easyir_target_temp:
    name: EasyIR Target Temperature
    min: 16
    max: 30
    step: 1
    mode: slider
    initial: 24

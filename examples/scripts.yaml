# Example scripts for low-code usage.
# Copy blocks to your Home Assistant scripts.yaml and adjust values.

lg_ir_power_off:
  alias: LG IR Power Off
  sequence:
    - service: easyir.send_profile_command
      data:
        action: "off"

lg_ir_cool_24_auto:
  alias: LG IR Cool 24 Auto
  sequence:
    - service: easyir.send_profile_command
      data:
        action: "cool"
        fan_mode: "auto"
        temperature: 24

lg_ir_send_raw_example:
  alias: LG IR Send Raw Example
  sequence:
    - service: easyir.send_raw
      data:
        raw_timings: [3198, -9806, 487, -1553, 579, -518]

name: EasyIR multi-agent roadmap
version: 1
last_updated: 2026-04-15
status: active
overview: >
  Transition EasyIR from MVP (TS1201/ZHA + static profiles) to a universal IR platform
  for Home Assistant with multi-hub support (WiFi/ZigBee/USB/ESPHome), protocol-aware
  command generation/parsing, capability-driven virtual devices, room-aware logging/sync,
  assistants, and sidebar tools. Development is split into small, reviewable PR slices
  with clean public history and strict backward compatibility.

principles:
  - README describes current MVP state; this roadmap describes target architecture.
  - Backward compatibility for configured users is mandatory.
  - Services easyir.send_raw and easyir.send_profile_command are stable API unless versioned.
  - Public git history must contain only reviewable final commits (no noisy WIP/debug chains).
  - New functionality is delivered as small vertical slices; first complete one pilot protocol.

technical_requirements:
  compatibility:
    hard_requirements:
      - Existing config entries continue working after upgrade without re-adding hubs/devices.
      - Existing bundled profile paths remain compatibility contract within major line.
      - Any profile path change requires alias/stub or async_migrate_entry migration.
      - Profile schema evolution is additive in major line unless explicit version break is introduced.
      - Any path/profile resolution change must include tests proving legacy entries still send commands.
  ir_core:
    canonical_model:
      required_fields:
        - carrier_frequency_hz
        - timings
        - repeat
        - duty_cycle
        - protocol_hint
        - integrity_metadata
      requirements:
        - Canonical frame is transport-agnostic and protocol-aware.
        - Canonical frame supports decode confidence and unknown fields passthrough.
    codec_registry:
      requirements:
        - Bidirectional conversion: raw timings <-> canonical IR frame.
        - Transport payload adapters: canonical IR frame <-> transport-specific payload.
        - Extensible registration model for new codecs without changing service contracts.
  protocol_capability_layer:
    requirements:
      - Protocol descriptor schema defines bit/field layout, command map, constraints, and checksums.
      - Capability matrix represents supported functions per protocol/device class.
      - Virtual device behavior (entity/widget/actions) is generated from capability matrix.
      - Profile database is metadata/capability constraints over protocol descriptors, not static code DB.
  transports_and_hubs:
    requirements:
      - Common transport adapter interface: send(), and later receive()/subscribe().
      - First migration target is legacy TS1201 path via new transport abstraction.
      - Automatic discovery filters only supported hub types/models.
      - Newly discovered supported-but-not-configured hubs are suggested for onboarding.
      - Multi-hub and many virtual end devices must be supported concurrently.
  incoming_pipeline_and_sync:
    requirements:
      - Incoming IR events are normalized and decoded to intent/state delta.
      - State sync updates only virtual devices visible in the event room scope.
      - If decoded signal cannot be mapped to existing visible device, suggest adding device type.
      - If room filter excludes device visibility, do not trigger add/sync actions.
  room_awareness:
    requirements:
      - Every virtual IR device belongs to explicit room scope.
      - Hub visibility map to rooms is explicit and enforced in log/sync/assistants.
      - Cross-room false-positive synchronization is blocked by policy.
  assistants:
    remote_autodetection:
      - Capture remote signal -> decode protocol -> infer capabilities -> propose profile binding.
    guided_pairing_no_remote:
      - Send candidate commands -> collect user reaction -> infer protocol/profile confidence.
  ha_sidebar_and_tools:
    requirements:
      - Dedicated EasyIR sidebar section.
      - Tools exposed incrementally: Signal Log, Format Transcoder, Remote Auto-detect, Guided Pairing.
      - Dynamic widgets/cards adapt to capability model instead of hardcoded mode sets.
  legal_governance:
    requirements:
      - Reuse policy mandates attribution to author and project name.
      - Fork with new name allowed only if upstream had no changes for >=1 year.
      - PR contributions include transfer-of-rights and third-party rights warranty policy.

delivery_strategy:
  phase_0_baseline:
    goal: Freeze MVP baseline and compatibility invariants before architectural expansion.
    outputs:
      - Compatibility contract document for services/config/profile paths.
      - Upgrade regression checklist.
  phase_1_foundation:
    goal: Introduce canonical IR core and transport abstraction behind existing APIs.
    outputs:
      - Canonical IR model.
      - Codec registry interfaces and first adapters.
      - TS1201 migrated behind transport interface.
  phase_2_pilot_vertical_slice:
    goal: Implement one full protocol/device slice end-to-end before scaling.
    outputs:
      - One AC protocol descriptor + parser + generator.
      - One model profile constraint set.
      - Capability-driven entity/widget behavior.
      - Inbound decode + room-aware sync + logging for pilot.
      - Assistant flows usable for pilot.
  phase_3_parallel_scale:
    goal: Scale protocols/devices/transports by repeating validated pilot template.
    outputs:
      - Parallel protocol onboarding in small independent PRs.
      - Reusable agent task brief for protocol slices (docs/protocol-onboarding.task-template.md).
      - Sidebar tools expansion and assistant quality improvements.

workstreams:
  - id: ws-baseline-audit
    title: Baseline compatibility audit
    depends_on: []
    can_run_parallel: false
    scope:
      - Capture compatibility invariants for services/config/profile paths.
      - Add regression fixtures for legacy config entries.
    pr_guidelines:
      - No runtime behavior change.
      - Documentation + tests only.
  - id: ws-core-codec
    title: Canonical IR core and codec registry
    depends_on: [ws-baseline-audit]
    can_run_parallel: false
    scope:
      - Add core canonical frame model and codec registry API.
      - Add compatibility adapter used by existing service handlers.
    pr_guidelines:
      - Preserve API of easyir.send_raw and easyir.send_profile_command.
      - No transport-specific assumptions in core package.
  - id: ws-transport-hub
    title: Transport abstraction and hub onboarding
    depends_on: [ws-core-codec]
    can_run_parallel: false
    scope:
      - Introduce transport adapter interface and TS1201 migration.
      - Add supported hub filtering and onboarding suggestions.
    pr_guidelines:
      - Backward-compatible migration path for existing ZHA users.
      - Avoid changing unrelated protocol logic.
  - id: ws-compat-guardrails
    title: Migration guardrails and upgrade regression
    depends_on: [ws-core-codec, ws-transport-hub]
    can_run_parallel: false
    scope:
      - Add async_migrate_entry where needed.
      - Add compatibility tests for profile path and config entry migration.
    pr_guidelines:
      - Must pass legacy send scenarios.
  - id: ws-pilot-protocol
    title: Pilot protocol and capability engine
    depends_on: [ws-core-codec]
    can_run_parallel: true
    scope:
      - Implement one AC protocol descriptor/parser/generator.
      - Map pilot model capabilities (example: ionizer support flag).
      - Integrate with entity model via capability engine.
    pr_guidelines:
      - Single protocol and single model only.
      - End-to-end behavior preferred over broad but shallow support.
  - id: ws-lg-universal-bit-engine
    title: Universal LG AC bit engine and feature flags
    depends_on: []
    can_run_parallel: true
    scope:
      - Implement universal LG AC command builder/parser from protocol bitfields (not precomputed command combinatorics).
      - Base protocol behavior on Arduino-IRremote LG AC references (`ac_LG.h` and `ac_LG.hpp`).
      - Move LG profile modeling to "protocol + supported feature flags" instead of model-specific command matrix.
      - Integrate protocol-based command generation into send path with backward-compatible fallback to legacy raw profile commands.
      - Add deterministic tests for encode/decode and feature-flag extraction.
    pr_guidelines:
      - Keep easyir.send_raw and easyir.send_profile_command contract unchanged.
      - Keep existing profile-path compatibility; do not break configured entries.
      - Explicitly document parity limits and unsupported flags.
  - id: ws-room-log-sync
    title: Room-aware signal log and state sync
    depends_on: [ws-core-codec, ws-transport-hub]
    can_run_parallel: true
    scope:
      - Event log storage and room visibility policy.
      - Incoming decode -> scoped sync pipeline.
      - Unknown decoded signal -> add-device suggestion logic.
    pr_guidelines:
      - Strict room filter enforcement.
      - No cross-room sync side effects.
  - id: ws-sidebar-widgets
    title: Sidebar tools and dynamic widgets
    depends_on: [ws-pilot-protocol, ws-room-log-sync]
    can_run_parallel: true
    scope:
      - Backend API for EasyIR sidebar tools.
      - Signal Log page first, then transcoder and assistants pages.
      - Capability-driven widget adaptation.
    pr_guidelines:
      - Deliver one tool/page per PR when possible.
  - id: ws-assistants
    title: Auto-detect and guided pairing assistants
    depends_on: [ws-pilot-protocol, ws-room-log-sync]
    can_run_parallel: true
    scope:
      - Remote capture/decode/infer workflow.
      - No-remote probing workflow with confidence scoring.
    pr_guidelines:
      - Keep flows deterministic and testable with fixtures/mocks.
  - id: ws-legal-governance
    title: Legal docs and contribution policy alignment
    depends_on: []
    can_run_parallel: true
    scope:
      - Align LICENSE/CONTRIBUTING/PR template with licensing and PR rights policy.
    pr_guidelines:
      - Docs-only PR.

parallel_execution_template:
  intent: >
    Template for orchestrator agent to launch multiple implementation agents in parallel
    with consistent context and strict PR hygiene.
  required_context_for_every_agent:
    - This roadmap file is source of truth for target architecture and sequencing.
    - README reflects MVP and does not limit target architecture.
    - Backward compatibility constraints are mandatory.
    - Keep PR narrow; avoid unrelated refactors and formatting churn in profile data.
    - Keep clean history: final logical commits only.
  task_packet_fields:
    - objective
    - in_scope
    - out_of_scope
    - concrete_files_to_touch
    - compatibility_constraints
    - migrations_needed
    - tests_to_add_or_run
    - acceptance_criteria
    - known_risks_and_assumptions
  branch_and_pr_policy:
    - One workstream per branch and PR.
    - One logical commit per small feature slice when feasible.
    - Do not push noisy exploratory commits.
    - PR body includes: what/why/validation/compatibility impact/risks.

pilot_first_rule:
  statement: >
    Implement first complete vertical slice for one AC protocol + one model before
    adding additional protocols in parallel.
  required_completion_for_pilot:
    - Protocol descriptor parser+generator working.
    - Capability mapping integrated with climate entity/widget.
    - Incoming decode logs and room-aware state sync.
    - Basic assistant flows available for pilot.
  scale_out_after_pilot:
    - Add protocol/model pairs as separate small PRs following same template.
    - Run in parallel only after pilot APIs stabilize.

